<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Bollettino I Benedettini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azzurro:   #4A90B8;
      --bianco:    #F5F0E8;
      --oro:       #FFD700;
      --grigio:    #2C2C2C;
      --overlay:   rgba(10, 20, 30, 0.52);
      --overlay2:  rgba(10, 20, 30, 0.72);
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── SFONDO ── */
    #bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: var(--grigio);
    }
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(10,20,30,0.55) 0%,
          rgba(10,20,30,0.30) 35%,
          rgba(10,20,30,0.30) 60%,
          rgba(10,20,30,0.75) 100%);
    }

    /* ── LAYOUT ── */
    #card {
      position: relative;
      width: 1080px;
      height: 1920px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px 80px 80px;
      color: var(--bianco);
      z-index: 1;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(10, 20, 30, 0.45);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 32px 40px;
      align-self: flex-start;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .brand-sopra {
      font-family: 'DM Sans', sans-serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--bianco);
      opacity: 0.75;
    }
    .brand-sotto {
      font-family: 'Playfair Display', serif;
      font-size: 58px;
      font-weight: 900;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--oro);
      text-shadow: 0 2px 18px rgba(0,0,0,0.55);
      line-height: 1;
    }
    .data-label {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--bianco);
      opacity: 0.88;
      text-transform: uppercase;
    }
    .divider {
      width: 80px;
      height: 3px;
      background: var(--oro);
      margin-top: 8px;
      border-radius: 2px;
    }

    /* ── CORPO CENTRALE ── */
    .body {
      display: flex;
      flex-direction: column;
      gap: 44px;
    }

    /* ── METEO ── */
    .meteo-block {
      display: flex;
      align-items: center;
      gap: 32px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 36px 48px;
    }
    .meteo-icona {
      font-size: 100px;
      line-height: 1;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.4));
    }
    .meteo-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .meteo-label {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bianco);
      opacity: 0.75;
    }
    .meteo-condizione {
      font-size: 30px;
      font-weight: 400;
      color: var(--bianco);
      opacity: 0.90;
      text-transform: capitalize;
    }

    /* ── ORARI ── */
    .orari-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }
    .orario-card {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .orario-titolo {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--oro);
    }
    .orario-stato {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--bianco);
      line-height: 1.1;
    }
    .orario-fascia {
      font-size: 26px;
      font-weight: 300;
      color: var(--bianco);
      opacity: 0.85;
      line-height: 1.5;
    }

    /* ── CITAZIONE ── */
    .citazione-block {
      background: rgba(74,144,184,0.18);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(74,144,184,0.35);
      border-left: 5px solid var(--oro);
      border-radius: 0 20px 20px 0;
      padding: 36px 44px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .citazione-testo {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      font-style: italic;
      color: var(--bianco);
      line-height: 1.45;
    }
    .citazione-autore {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--bianco);
      opacity: 0.72;
      text-align: right;
    }

    /* ── FOOTER ── */
    .footer {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      text-align: center;
    }
    .claim {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-style: italic;
      font-weight: 400;
      color: var(--bianco);
      opacity: 0.80;
      letter-spacing: 0.04em;
    }
    .footer-tag {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--bianco);
      opacity: 0.50;
    }

    /* ── CHIUSO override colore ── */
    .stato-chiuso { color: #ff8a80; }
  </style>
</head>
<body>

<!-- SFONDO -->
<div id="bg"></div>

<!-- CARD PRINCIPALE -->
<div id="card">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-sopra">Bollettino</div>
      <div class="brand-sotto">Benedettino</div>
    </div>
    <div class="data-label" id="el-data">— data —</div>
    <div class="divider"></div>
  </div>

  <!-- CORPO -->
  <div class="body">

    <!-- METEO -->
    <div class="meteo-block">
      <div class="meteo-icona" id="el-icona">☀️</div>
      <div class="meteo-info">
        <div class="meteo-label">Polignano a Mare</div>
        <div class="meteo-condizione" id="el-condizione">—</div>
      </div>
    </div>

    <!-- ORARI -->
    <div class="orari-grid">
      <div class="orario-card">
        <div class="orario-titolo">☕ Bar</div>
        <div class="orario-stato" id="el-bar-stato">—</div>
        <div class="orario-fascia" id="el-bar-orario"></div>
      </div>
      <div class="orario-card">
        <div class="orario-titolo">🍽️ Ristorante</div>
        <div class="orario-stato" id="el-rist-stato">—</div>
        <div class="orario-fascia" id="el-rist-orario"></div>
      </div>
    </div>

    <!-- CITAZIONE -->
    <div class="citazione-block">
      <div class="citazione-testo" id="el-citazione">«…»</div>
      <div class="citazione-autore" id="el-autore">—</div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="claim">Da lontano sembriamo tutti normali</div>
    <div class="footer-tag">ibenedettini.it</div>
  </div>

</div>

<script>
  /* ══════════════════════════════════════════════════
     MAPPATURA PARAMETRI URL → ELEMENTI HTML

     Parametri supportati (tutti opzionali — fallback integrato):
       bg          → URL immagine sfondo (Dropbox share link)
       data        → Es. "18 marzo 2026"
       condizione  → Es. "nuvoloso" (testo descrittivo meteo)
       icona       → Emoji meteo: ☀️ ⛅ 🌧️ 🌩️ 🌫️ ecc.
       bar         → Es. "Aperto" o "Chiuso"
       bar_orario  → Es. "08:00 – 18:00"
       rist        → Es. "Aperto" o "Chiuso"
       rist_orario → Es. "12:30 – 15:00 / 19:30 – 22:30"
       citazione   → Testo citazione del giorno
       autore      → Autore citazione

     Esempio URL completo:
     https://benedigiteam.github.io/-bollettino-benedettini/
       ?bg=https://dl.dropboxusercontent.com/…
       &data=18%20marzo%202026
       &condizione=nuvoloso
       &icona=⛅
       &bar=Aperto
       &bar_orario=08%3A00%20–%2018%3A00
       &rist=Chiuso
       &rist_orario=
       &citazione=Il%20mare%20non%20ha%20fine
       &autore=Anonimo
  ══════════════════════════════════════════════════ */

  (function () {
    const p = new URLSearchParams(window.location.search);
    const get = (k, def) => p.has(k) && p.get(k).trim() !== '' ? p.get(k).trim() : def;

    /* Sfondo */
    const bgUrl = get('bg', '');
    if (bgUrl) {
      document.getElementById('bg').style.backgroundImage = `url('${bgUrl}')`;
    }

    /* Data */
    document.getElementById('el-data').textContent = get('data', '—');

    /* Meteo */
    document.getElementById('el-condizione').textContent = get('condizione', '—');
    document.getElementById('el-icona').textContent = get('icona', '🌤️');

    /* Bar */
    const barStato = get('bar', '—');
    const barEl = document.getElementById('el-bar-stato');
    barEl.textContent = barStato;
    if (barStato.toLowerCase() === 'chiuso') barEl.classList.add('stato-chiuso');
    document.getElementById('el-bar-orario').textContent = get('bar_orario', '');

    /* Ristorante */
    const ristStato = get('rist', '—');
    const ristEl = document.getElementById('el-rist-stato');
    ristEl.textContent = ristStato;
    if (ristStato.toLowerCase() === 'chiuso') ristEl.classList.add('stato-chiuso');
    document.getElementById('el-rist-orario').innerHTML =
      get('rist_orario', '').replace('/', '<br>');

    /* Citazione */
    const cit = get('citazione', '');
    const aut = get('autore', '');
    document.getElementById('el-citazione').textContent = cit ? `«${cit}»` : '«…»';
    document.getElementById('el-autore').textContent = aut ? `— ${aut}` : '';

  })();
</script>

</body>
</html>
